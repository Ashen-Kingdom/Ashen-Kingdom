<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Three.js Day/Night Cycle</title>
  <style>body{margin:0;overflow:hidden}</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,5,15);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

// Lights
const ambient=new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambient);
const sun=new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
sun.castShadow=true;
scene.add(sun);

// Ground
const ground=new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x228822})
);
ground.rotation.x=-Math.PI/2;
ground.receiveShadow=true;
scene.add(ground);

// Cycle
let clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  let t=clock.getElapsedTime();
  let cycle=(t%60)/60; // 60s full cycle
  let angle=cycle*2*Math.PI;
  sun.position.set(Math.cos(angle)*20,Math.sin(angle)*20,10);
  sun.intensity=Math.max(0.2,Math.sin(angle));
  ambient.intensity=0.4+0.6*Math.sin(angle);
  let skyColor=new THREE.Color().setHSL(0.6,0.5,0.5*Math.sin(angle)+0.5);
  renderer.setClearColor(skyColor);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Three.js Terrain + Day/Night</title>
  <style>body{margin:0;overflow:hidden}</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x88ccff,20,80);

const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,10,25);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

// Lights
const ambient=new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambient);
const sun=new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
sun.castShadow=true;
scene.add(sun);

// Terrain
const terrainGeo=new THREE.PlaneGeometry(100,100,100,100);
for(let i=0;i<terrainGeo.vertices?.length;i++){ // legacy check
  terrainGeo.vertices[i].z=Math.sin(i*0.1)*Math.cos(i*0.1)*2;
}
terrainGeo.computeVertexNormals();
const terrainMat=new THREE.MeshStandardMaterial({color:0x228822,roughness:0.7,metalness:0.2});
const terrain=new THREE.Mesh(terrainGeo,terrainMat);
terrain.rotation.x=-Math.PI/2;
terrain.receiveShadow=true;
scene.add(terrain);

// River
const riverGeo=new THREE.BoxGeometry(100,0.2,5);
const riverMat=new THREE.MeshStandardMaterial({color:0x3399ff,emissive:0x2244ff,roughness:0.3,metalness:0.8});
const river=new THREE.Mesh(riverGeo,riverMat);
river.position.set(0,0.05,0);
scene.add(river);

// Cycle
let clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  let t=clock.getElapsedTime();
  let cycle=(t%60)/60;
  let angle=cycle*2*Math.PI;
  sun.position.set(Math.cos(angle)*30,Math.sin(angle)*30,10);
  sun.intensity=Math.max(0.2,Math.sin(angle));
  ambient.intensity=0.4+0.6*Math.sin(angle);
  let skyColor=new THREE.Color().setHSL(0.6,0.5,0.5*Math.sin(angle)+0.5);
  renderer.setClearColor(skyColor);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>

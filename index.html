<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚔️ High‑Poly 3D Grand Strategy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a12;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #0a0a12;
        }
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            touch-action: none;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        #hud>* {
            pointer-events: auto;
        }
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.75) 0%, transparent 100%);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }
        #top-bar .resources {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        #top-bar .resources span {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .res-val {
            color: #ffd866;
            font-weight: 700;
        }
        #view-toggle {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 6px 16px;
            border-radius: 24px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }
        #view-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }
        #view-toggle:active {
            transform: scale(0.95);
        }
        #bottom-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(10, 10, 18, 0.8);
            backdrop-filter: blur(16px);
            padding: 10px 18px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 92%;
        }
        #bottom-panel button {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            min-width: 52px;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        #bottom-panel button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        #bottom-panel button:active {
            transform: scale(0.92);
        }
        #bottom-panel button .badge {
            background: #f5a623;
            color: #000;
            border-radius: 12px;
            padding: 0 8px;
            font-size: 10px;
            font-weight: 700;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f5a623, #e08a1a) !important;
            border-color: #f5a623 !important;
            color: #000 !important;
            box-shadow: 0 4px 20px rgba(245, 166, 35, 0.3);
        }
        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b) !important;
            border-color: #e74c3c !important;
            color: #fff !important;
        }
        #selection-info {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 16px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 80%;
            font-weight: 500;
        }
        #selection-info.visible {
            opacity: 1;
        }
        #boss-health {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 12px 16px;
            border: 1px solid rgba(255, 200, 50, 0.2);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
            text-align: center;
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.7);
        }
        #boss-health.visible {
            opacity: 1;
        }
        #boss-health .label {
            color: #ffd866;
            font-size: 13px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255, 200, 50, 0.2);
        }
        #boss-health .bar-bg {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 6px 0 4px;
            overflow: hidden;
        }
        #boss-health .bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #e74c3c, #f5a623, #2ecc71);
            border-radius: 10px;
            transition: width 0.2s;
        }
        #boss-health .hp-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
        }
        .float-ui {
            position: absolute;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            padding: 2px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            white-space: nowrap;
            z-index: 20;
        }
        #toast {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            color: #ffd866;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(255, 200, 50, 0.15);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s, transform 0.3s;
            transform: translateX(-50%) translateY(10px);
            text-align: center;
            z-index: 30;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        @media (max-width:600px) {
            #bottom-panel button {
                padding: 6px 10px;
                font-size: 10px;
                min-width: 40px;
            }
            #boss-health {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div id="top-bar">
                <div class="resources">
                    <span>🪙 <span class="res-val" id="gold-display">500</span></span>
                    <span>🪵 <span class="res-val" id="wood-display">300</span></span>
                    <span>⚔️ <span class="res-val" id="army-display">0</span></span>
                </div>
                <button id="view-toggle">🌍 World Map</button>
            </div>
            <div id="selection-info">Tap a building or troop</div>
            <div id="boss-health">
                <div class="label">🐉 BEHEMOTH</div>
                <div class="bar-bg"><div class="bar-fill" id="boss-hp-fill" style="width:100%"></div></div>
                <div class="hp-text" id="boss-hp-text">100%</div>
            </div>
            <div id="bottom-panel">
                <button id="btn-cityhall">🏰 Hall <span class="badge" id="ch-level">1</span></button>
                <button id="btn-gold">⛏️ Gold</button>
                <button id="btn-wood">🪵 Lumber</button>
                <button id="btn-barracks">⚔️ Bcks</button>
                <button id="btn-troop-cav">🐴 Cav</button>
                <button id="btn-troop-inf">🛡️ Inf</button>
                <button id="btn-troop-fly">🦅 Fly</button>
                <button id="btn-raid" class="btn-danger">⚡ Raid</button>
            </div>
            <div id="toast"></div>
        </div>
        <div id="float-container" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15;overflow:hidden;"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
    </script>
    <script>
        (function() {
            'use strict';

            // ---- CONFIG ----
            const CONFIG = {
                GOLD: 500,
                WOOD: 300,
                ARMY: 0,
                CITY_HALL_LEVEL: 1,
                DAY_DURATION: 60,
                TROOP_SPEED: 2.8,
                BOSS_MAX_HP: 1000,
                BOSS_HP: 1000,
                VIEW: 'city',
                SELECTED: null,
                TROOPS: [],
                PARTICLES: [],
                FLOAT_UIS: [],
                BOSS_ENGAGED: false,
                BOSS_DEFEATED: false,
                TICK: 0,
                UPGRADE_TIMERS: {},
            };

            // ---- THREE.JS ----
            const container = document.getElementById('game-container');
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a2a4a);
            scene.fog = new THREE.Fog(0x1a2a4a, 45, 130);

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(25, 20, 30);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.prepend(renderer.domElement);

            // ---- LIGHTS (high quality) ----
            const ambientLight = new THREE.AmbientLight(0x6688cc, 0.5);
            scene.add(ambientLight);
            const hemi = new THREE.HemisphereLight(0x87ceeb, 0x3a1f0a, 0.6);
            scene.add(hemi);

            const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
            sunLight.position.set(30, 40, 20);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 100;
            sunLight.shadow.camera.left = -55;
            sunLight.shadow.camera.right = 55;
            sunLight.shadow.camera.top = 55;
            sunLight.shadow.camera.bottom = -55;
            sunLight.shadow.bias = -0.001;
            scene.add(sunLight);

            const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
            fillLight.position.set(-20, 10, -30);
            scene.add(fillLight);

            const sunSphere = new THREE.Mesh(
                new THREE.SphereGeometry(1.2, 24, 24),
                new THREE.MeshBasicMaterial({ color: 0xffdd44 })
            );
            sunSphere.position.copy(sunLight.position);
            scene.add(sunSphere);

            // ---- HIGH-POLY TERRAIN ----
            const groundSize = 60;
            const segments = 80; // high resolution
            const geoGround = new THREE.PlaneGeometry(groundSize, groundSize, segments, segments);
            geoGround.rotateX(-Math.PI / 2);
            const pos = geoGround.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i);
                const z = pos.getZ(i);
                let h = 0;
                h += 2.8 * Math.exp(-((x - 10) ** 2 + (z - 8) ** 2) / 35);
                h += 3.2 * Math.exp(-((x + 12) ** 2 + (z + 10) ** 2) / 30);
                h += 2.0 * Math.exp(-((x + 6) ** 2 + (z - 14) ** 2) / 22);
                h += 2.2 * Math.exp(-((x - 14) ** 2 + (z + 12) ** 2) / 28);
                const riv = Math.sin(x * 0.3) * 2.5 + Math.cos(z * 0.25) * 2.0;
                h += -1.4 * Math.exp(-(riv ** 2) / 7);
                h += 0.35 * Math.sin(x * 0.12) * Math.cos(z * 0.18);
                h = Math.max(h, -0.6);
                pos.setY(i, h);
            }
            pos.needsUpdate = true;
            geoGround.computeVertexNormals();

            const groundMat = new THREE.MeshStandardMaterial({
                color: 0x4a8c5a,
                roughness: 0.7,
                metalness: 0.05,
                emissive: new THREE.Color(0x1a3a2a),
                emissiveIntensity: 0.1,
                flatShading: false,
            });
            const ground = new THREE.Mesh(geoGround, groundMat);
            ground.receiveShadow = true;
            scene.add(ground);

            // ---- HIGH-POLY RIVER (smooth tube) ----
            const pts = [];
            for (let t = -25; t <= 25; t += 0.3) {
                const x = t;
                const z = 4 * Math.sin(x * 0.3) + 2 * Math.cos(x * 0.25);
                pts.push(new THREE.Vector3(x, 0.12, z));
            }
            const curve = new THREE.CatmullRomCurve3(pts);
            const river = new THREE.Mesh(
                new THREE.TubeGeometry(curve, 120, 0.9, 12, false),
                new THREE.MeshStandardMaterial({
                    color: 0x2a6a8a,
                    roughness: 0.1,
                    metalness: 0.4,
                    emissive: new THREE.Color(0x1a4a6a),
                    emissiveIntensity: 0.2,
                    transparent: true,
                    opacity: 0.75,
                })
            );
            river.receiveShadow = true;
            scene.add(river);

            // ---- BUILDING FACTORY (HIGH-POLY) ----
            function createBuilding(type, x, z, scale = 1, color = 0xccaa88) {
                const group = new THREE.Group();
                let base, top;
                const s = scale;
                if (type === 'castle') {
                    base = new THREE.Mesh(
                        new THREE.CylinderGeometry(1.8 * s, 2.2 * s, 2.4 * s, 36, 18),
                        new THREE.MeshStandardMaterial({ color: 0xccaa88, roughness: 0.25, metalness: 0.65 })
                    );
                    base.position.y = 1.2 * s;
                    base.castShadow = true;
                    base.receiveShadow = true;
                    group.add(base);
                    const tower = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.6 * s, 0.8 * s, 1.8 * s, 28, 14),
                        new THREE.MeshStandardMaterial({ color: 0xddbb99, roughness: 0.2, metalness: 0.7 })
                    );
                    tower.position.y = 2.8 * s;
                    tower.castShadow = true;
                    group.add(tower);
                    const spire = new THREE.Mesh(
                        new THREE.ConeGeometry(0.5 * s, 1.2 * s, 28, 14),
                        new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.15, metalness: 0.85,
                            emissive: new THREE.Color(0xffd700), emissiveIntensity: 0.2 })
                    );
                    spire.position.y = 4.0 * s;
                    spire.castShadow = true;
                    group.add(spire);
                    const ring = new THREE.Mesh(
                        new THREE.TorusGeometry(2.0 * s, 0.08 * s, 24, 32),
                        new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: new THREE.Color(0xffd700),
                            emissiveIntensity: 0.6, roughness: 0.1, metalness: 0.9 })
                    );
                    ring.position.y = 0.4 * s;
                    ring.rotation.x = Math.PI / 2;
                    group.add(ring);
                    const ring2 = ring.clone();
                    ring2.position.y = 2.0 * s;
                    ring2.scale.set(0.8, 0.8, 0.8);
                    group.add(ring2);
                } else if (type === 'gold') {
                    base = new THREE.Mesh(
                        new THREE.CylinderGeometry(1.2 * s, 1.4 * s, 1.6 * s, 28, 14),
                        new THREE.MeshStandardMaterial({ color: 0xccaa44, roughness: 0.3, metalness: 0.7,
                            emissive: new THREE.Color(0xccaa44), emissiveIntensity: 0.15 })
                    );
                    base.position.y = 0.8 * s;
                    base.castShadow = true;
                    group.add(base);
                    const nugget = new THREE.Mesh(
                        new THREE.IcosahedronGeometry(0.6 * s, 2),
                        new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.15, metalness: 0.9,
                            emissive: new THREE.Color(0xffd700), emissiveIntensity: 0.3 })
                    );
                    nugget.position.y = 1.8 * s;
                    nugget.castShadow = true;
                    group.add(nugget);
                } else if (type === 'wood') {
                    base = new THREE.Mesh(
                        new THREE.CylinderGeometry(1.0 * s, 1.3 * s, 1.8 * s, 24, 12),
                        new THREE.MeshStandardMaterial({ color: 0x8a6a4a, roughness: 0.7, metalness: 0.0 })
                    );
                    base.position.y = 0.9 * s;
                    base.castShadow = true;
                    group.add(base);
                    const log = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.25 * s, 0.3 * s, 1.2 * s, 16, 8),
                        new THREE.MeshStandardMaterial({ color: 0x6a4a2a, roughness: 0.85 })
                    );
                    log.position.set(0.6 * s, 1.6 * s, 0);
                    log.rotation.z = 0.1;
                    log.castShadow = true;
                    group.add(log);
                    const log2 = log.clone();
                    log2.position.set(-0.6 * s, 1.4 * s, 0.4 * s);
                    log2.rotation.z = -0.2;
                    group.add(log2);
                } else if (type === 'barracks') {
                    base = new THREE.Mesh(
                        new THREE.BoxGeometry(2.0 * s, 1.2 * s, 2.0 * s),
                        new THREE.MeshStandardMaterial({ color: 0x8a6a5a, roughness: 0.5, metalness: 0.2 })
                    );
                    base.position.y = 0.6 * s;
                    base.castShadow = true;
                    base.receiveShadow = true;
                    group.add(base);
                    const roof = new THREE.Mesh(
                        new THREE.ConeGeometry(1.6 * s, 1.0 * s, 28, 14),
                        new THREE.MeshStandardMaterial({ color: 0x6a4a3a, roughness: 0.6, metalness: 0.1 })
                    );
                    roof.position.y = 1.6 * s;
                    roof.rotation.y = Math.PI / 4;
                    roof.castShadow = true;
                    group.add(roof);
                    const flag = new THREE.Mesh(
                        new THREE.PlaneGeometry(0.4 * s, 0.6 * s),
                        new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: new THREE.Color(0xff4444),
                            emissiveIntensity: 0.25, side: THREE.DoubleSide })
                    );
                    flag.position.set(0.6 * s, 2.2 * s, 0);
                    group.add(flag);
                } else { // house
                    base = new THREE.Mesh(
                        new THREE.BoxGeometry(1.2 * s, 0.8 * s, 1.2 * s),
                        new THREE.MeshStandardMaterial({ color: 0xbbaa88, roughness: 0.65 })
                    );
                    base.position.y = 0.4 * s;
                    base.castShadow = true;
                    group.add(base);
                    const roof2 = new THREE.Mesh(
                        new THREE.ConeGeometry(1.0 * s, 0.8 * s, 24, 12),
                        new THREE.MeshStandardMaterial({ color: 0x8a4a3a, roughness: 0.7 })
                    );
                    roof2.position.y = 1.0 * s;
                    roof2.rotation.y = Math.PI / 4;
                    roof2.castShadow = true;
                    group.add(roof2);
                }
                group.position.set(x, 0, z);
                return group;
            }

            const buildingData = [
                { type: 'castle', x: 0, z: 0, scale: 1.4, id: 'cityhall' },
                { type: 'gold', x: 5, z: 3, scale: 1.0, id: 'gold1' },
                { type: 'gold', x: -5, z: 4, scale: 1.0, id: 'gold2' },
                { type: 'wood', x: 6, z: -4, scale: 1.0, id: 'wood1' },
                { type: 'wood', x: -6, z: -3, scale: 1.0, id: 'wood2' },
                { type: 'barracks', x: 3, z: -6, scale: 1.1, id: 'barracks' },
                { type: 'house', x: -3, z: 6, scale: 0.8, id: 'house1' },
                { type: 'house', x: 4, z: 7, scale: 0.8, id: 'house2' },
                { type: 'house', x: -4, z: -7, scale: 0.8, id: 'house3' },
            ];

            const buildingMap = {};
            buildingData.forEach(d => {
                const mesh = createBuilding(d.type, d.x, d.z, d.scale);
                scene.add(mesh);
                buildingMap[d.id] = { mesh, data: d, level: d.id === 'cityhall' ? CONFIG.CITY_HALL_LEVEL : 1,
                    upgrading: false, upgradeEnd: 0, _floatUI: null };
            });

            // ---- WORLD OBJECTS (HIGH-POLY TREES) ----
            function createTree(x, z, scale = 1) {
                const g = new THREE.Group();
                const trunk = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.15 * scale, 0.25 * scale, 0.8 * scale, 12, 6),
                    new THREE.MeshStandardMaterial({ color: 0x5a3a2a, roughness: 0.85 })
                );
                trunk.position.y = 0.4 * scale;
                trunk.castShadow = true;
                g.add(trunk);
                const fol = new THREE.Mesh(
                    new THREE.SphereGeometry(0.6 * scale, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0x2a8a3a, roughness: 0.75, emissive: new THREE.Color(
                            0x1a5a2a), emissiveIntensity: 0.05 })
                );
                fol.position.y = 1.0 * scale + 0.2 * scale;
                fol.castShadow = true;
                g.add(fol);
                g.position.set(x, 0, z);
                return g;
            }

            const worldObjects = [];
            for (let i = 0; i < 70; i++) {
                const x = (Math.random() - 0.5) * 48;
                const z = (Math.random() - 0.5) * 48;
                if (Math.abs(x) < 10 && Math.abs(z) < 10) continue;
                const tree = createTree(x, z, 0.5 + Math.random() * 0.7);
                scene.add(tree);
                worldObjects.push(tree);
            }

            // ---- BARBARIANS (HIGH-POLY) ----
            const barbarians = [];

            function createBarb(x, z) {
                const g = new THREE.Group();
                const body = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.5, 0.6, 1.0, 24, 12),
                    new THREE.MeshStandardMaterial({ color: 0x8a3a2a, roughness: 0.7, metalness: 0.15 })
                );
                body.position.y = 0.5;
                body.castShadow = true;
                g.add(body);
                const head = new THREE.Mesh(
                    new THREE.SphereGeometry(0.35, 20, 20),
                    new THREE.MeshStandardMaterial({ color: 0xccaa88, roughness: 0.65 })
                );
                head.position.y = 1.2;
                head.castShadow = true;
                g.add(head);
                const spear = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.04, 0.06, 0.8, 10, 4),
                    new THREE.MeshStandardMaterial({ color: 0xccaa88, metalness: 0.5, roughness: 0.3 })
                );
                spear.position.set(0.5, 1.0, 0);
                spear.rotation.z = 0.3;
                g.add(spear);
                g.position.set(x, 0, z);
                g.userData = { hp: 30, maxHp: 30, type: 'barbarian', engaged: false };
                return g;
            }

            for (let i = 0; i < 15; i++) {
                const x = (Math.random() - 0.5) * 40;
                const z = (Math.random() - 0.5) * 40;
                if (Math.abs(x) < 12 && Math.abs(z) < 12) continue;
                const b = createBarb(x, z);
                scene.add(b);
                barbarians.push(b);
                worldObjects.push(b);
            }

            // ---- BEHEMOTH (HIGH-POLY) ----
            const bossGroup = new THREE.Group();
            const bossBody = new THREE.Mesh(
                new THREE.CylinderGeometry(1.8, 2.2, 3.5, 36, 18),
                new THREE.MeshStandardMaterial({ color: 0x4a2a6a, roughness: 0.25, metalness: 0.7, emissive: new THREE
                        .Color(0x6a3a8a), emissiveIntensity: 0.2 })
            );
            bossBody.position.y = 1.8;
            bossBody.castShadow = true;
            bossGroup.add(bossBody);

            const bossHead = new THREE.Mesh(
                new THREE.SphereGeometry(1.0, 28, 28),
                new THREE.MeshStandardMaterial({ color: 0x5a3a7a, roughness: 0.15, metalness: 0.65, emissive: new THREE
                        .Color(0x8a4aaa), emissiveIntensity: 0.25 })
            );
            bossHead.position.set(0, 3.8, 1.2);
            bossHead.castShadow = true;
            bossGroup.add(bossHead);

            for (let s = -1; s <= 1; s += 2) {
                const horn = new THREE.Mesh(
                    new THREE.ConeGeometry(0.3, 0.8, 20, 10),
                    new THREE.MeshStandardMaterial({ color: 0x8a6a4a, roughness: 0.35, metalness: 0.5 })
                );
                horn.position.set(s * 0.7, 4.2, 1.6);
                horn.rotation.z = s * 0.4;
                horn.rotation.x = -0.3;
                bossGroup.add(horn);
            }
            for (let s = -1; s <= 1; s += 2) {
                const wing = new THREE.Mesh(
                    new THREE.BoxGeometry(0.2, 1.5, 2.0),
                    new THREE.MeshStandardMaterial({ color: 0x3a1a4a, roughness: 0.4, metalness: 0.3, transparent: true,
                        opacity: 0.7 })
                );
                wing.position.set(s * 1.8, 2.5, 0);
                wing.rotation.z = s * 0.3;
                wing.rotation.x = 0.2;
                bossGroup.add(wing);
            }
            const core = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 28, 28),
                new THREE.MeshStandardMaterial({
                    color: 0xff4488,
                    emissive: new THREE.Color(0xff4488),
                    emissiveIntensity: 1.8,
                    roughness: 0.05,
                    metalness: 0.95,
                })
            );
            core.position.set(0, 2.0, 0);
            bossGroup.add(core);

            bossGroup.position.set(-18, 0, -15);
            bossGroup.scale.set(1.3, 1.3, 1.3);
            scene.add(bossGroup);
            worldObjects.push(bossGroup);

            // ---- TROOPS (HIGH-POLY) ----
            const troops = [];

            function createTroop(type, x, z, tier = 1) {
                const g = new THREE.Group();
                let color, shape, yOff = 0;
                if (type === 'cavalry') {
                    color = 0x44aaff;
                    shape = new THREE.CylinderGeometry(0.3, 0.35, 0.6, 20, 10);
                    yOff = 0.3;
                } else if (type === 'infantry') {
                    color = 0xff6644;
                    shape = new THREE.BoxGeometry(0.4, 0.5, 0.4);
                    yOff = 0.25;
                } else {
                    color = 0x66ff88;
                    shape = new THREE.SphereGeometry(0.3, 20, 20);
                    yOff = 1.2;
                }
                const mat = new THREE.MeshStandardMaterial({
                    color: color,
                    roughness: 0.25,
                    metalness: 0.5,
                    emissive: new THREE.Color(color),
                    emissiveIntensity: 0.12 * tier,
                });
                const mesh = new THREE.Mesh(shape, mat);
                mesh.position.y = yOff;
                mesh.castShadow = true;
                g.add(mesh);
                const ringT = new THREE.Mesh(
                    new THREE.TorusGeometry(0.4, 0.04, 16, 20),
                    new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: new THREE.Color(0xffd700),
                        emissiveIntensity: 0.35 * tier })
                );
                ringT.position.y = yOff + 0.2;
                ringT.rotation.x = Math.PI / 2;
                g.add(ringT);
                g.position.set(x, 0, z);
                g.userData = {
                    type: type,
                    tier: tier,
                    hp: 20 * tier,
                    maxHp: 20 * tier,
                    attack: 3 * tier,
                    speed: type === 'cavalry' ? 3.5 : (type === 'flying' ? 2.8 : 2.2),
                    state: 'idle',
                    target: null,
                    path: [],
                    dest: null,
                    engaged: false,
                    cooldown: 0,
                };
                return g;
            }

            // ---- PARTICLES ----
            const particles = [];

            function spawnParticles(position, color, count = 28, speed = 3.5) {
                const geo = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);
                const c = new THREE.Color(color);
                for (let i = 0; i < count; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 1.8;
                    positions[i * 3 + 1] = (Math.random() - 0.5) * 1.8;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 1.8;
                    colors[i * 3] = c.r;
                    colors[i * 3 + 1] = c.g;
                    colors[i * 3 + 2] = c.b;
                }
                geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                const mat2 = new THREE.PointsMaterial({
                    size: 0.25,
                    vertexColors: true,
                    transparent: true,
                    opacity: 1,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                });
                const points = new THREE.Points(geo, mat2);
                points.position.copy(position);
                scene.add(points);
                particles.push({
                    mesh: points,
                    life: 1.4,
                    maxLife: 1.4,
                    speed: speed,
                    vx: (Math.random() - 0.5) * speed,
                    vy: (Math.random() - 0.5) * speed + 1.2,
                    vz: (Math.random() - 0.5) * speed,
                });
            }

            function spawnDamageFloat(position, amount, color = '#ff6644') {
                const el = document.createElement('div');
                el.textContent = '-' + amount;
                el.style.cssText = `
                        position:absolute; color:${color}; font-weight:800; font-size:22px;
                        text-shadow:0 0 24px rgba(255,0,0,0.6), 0 2px 8px rgba(0,0,0,0.9);
                        pointer-events:none; z-index:25; font-family:sans-serif;
                        transform:translate(-50%,-50%);
                        transition: all 0.8s ease-out;
                        opacity:1;
                    `;
                const container2 = document.getElementById('float-container');
                container2.appendChild(el);
                const vec = position.clone();
                vec.project(camera);
                const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                requestAnimationFrame(() => {
                    el.style.transform = 'translate(-50%,-80px)';
                    el.style.opacity = '0';
                });
                setTimeout(() => { el.remove(); }, 900);
            }

            // ---- FLOAT UI ----
            const floatUIs = [];

            function createFloatUI(worldPos, text, color = '#ffd866') {
                const el = document.createElement('div');
                el.className = 'float-ui';
                el.innerHTML = text;
                el.style.color = color;
                const container2 = document.getElementById('float-container');
                container2.appendChild(el);
                const obj = { el, pos: worldPos.clone(), active: true };
                floatUIs.push(obj);
                return obj;
            }

            function updateFloatUIs() {
                floatUIs.forEach(f => {
                    if (!f.active) { f.el.remove(); return; }
                    const vec = f.pos.clone();
                    vec.project(camera);
                    const x = (vec.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (-vec.y * 0.5 + 0.5) * window.innerHeight;
                    if (vec.z > 1) f.el.style.display = 'none';
                    else f.el.style.display = 'block';
                    f.el.style.left = x + 'px';
                    f.el.style.top = y + 'px';
                });
            }

            // ---- GAME STATE ----
            let gold = CONFIG.GOLD,
                wood = CONFIG.WOOD,
                armyCount = CONFIG.ARMY,
                cityHallLevel = CONFIG.CITY_HALL_LEVEL,
                bossHP = CONFIG.BOSS_HP;
            const bossMaxHP = CONFIG.BOSS_MAX_HP;
            let viewMode = CONFIG.VIEW,
                selectedObject = null,
                isPanning = false,
                prevPointer = { x: 0, y: 0 };
            let cameraTarget = new THREE.Vector3(0, 0, 0),
                cameraRadius = 30,
                targetRadius = 30,
                cameraTheta = 0.6,
                targetTheta = 0.6,
                cameraPhi = 0.9,
                targetPhi = 0.9;
            let dayTime = 0,
                raidCooldown = 0,
                resourceTimer = 0;
            let toastTimeout = null;

            // ---- UI REFS ----
            const goldDisplay = document.getElementById('gold-display');
            const woodDisplay = document.getElementById('wood-display');
            const armyDisplay = document.getElementById('army-display');
            const viewToggle = document.getElementById('view-toggle');
            const selectionInfo = document.getElementById('selection-info');
            const bossHealthDiv = document.getElementById('boss-health');
            const bossHpFill = document.getElementById('boss-hp-fill');
            const bossHpText = document.getElementById('boss-hp-text');
            const toastEl = document.getElementById('toast');
            const chLevel = document.getElementById('ch-level');

            function updateUI() {
                goldDisplay.textContent = Math.floor(gold);
                woodDisplay.textContent = Math.floor(wood);
                armyDisplay.textContent = armyCount;
                chLevel.textContent = cityHallLevel;
                const pct = Math.max(0, (bossHP / bossMaxHP) * 100);
                bossHpFill.style.width = pct + '%';
                bossHpText.textContent = Math.floor(pct) + '%';
                if (bossHP <= 0) {
                    bossHealthDiv.classList.remove('visible');
                    if (!CONFIG.BOSS_DEFEATED) {
                        CONFIG.BOSS_DEFEATED = true;
                        showToast('🎉 Behemoth Defeated! +200 Gold, +100 Wood');
                        gold += 200;
                        wood += 100;
                        updateUI();
                    }
                } else {
                    bossHealthDiv.classList.add('visible');
                }
            }

            function showToast(msg) {
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                if (toastTimeout) clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => { toastEl.classList.remove('show'); }, 2800);
            }

            // ---- CAMERA ----
            function updateCamera() {
                cameraRadius += (targetRadius - cameraRadius) * 0.06;
                cameraTheta += (targetTheta - cameraTheta) * 0.06;
                cameraPhi += (targetPhi - cameraPhi) * 0.06;
                const x = cameraRadius * Math.sin(cameraPhi) * Math.cos(cameraTheta);
                const y = cameraRadius * Math.cos(cameraPhi) + 8;
                const z = cameraRadius * Math.sin(cameraPhi) * Math.sin(cameraTheta);
                camera.position.lerp(new THREE.Vector3(
                    cameraTarget.x + x,
                    cameraTarget.y + y,
                    cameraTarget.z + z
                ), 0.08);
                camera.lookAt(cameraTarget);
            }

            function setView(target, radius, theta, phi) {
                targetRadius = radius;
                targetTheta = theta;
                targetPhi = phi;
                cameraTarget.copy(target);
            }

            // ---- VIEW TOGGLE ----
            function toggleView() {
                if (viewMode === 'city') {
                    viewMode = 'world';
                    viewToggle.textContent = '🏙️ City View';
                    setView(new THREE.Vector3(-5, 0, -5), 45, 0.8, 0.9);
                    showToast('🌍 World Map – Find the Behemoth');
                } else {
                    viewMode = 'city';
                    viewToggle.textContent = '🌍 World Map';
                    setView(new THREE.Vector3(0, 0, 0), 30, 0.6, 0.9);
                    showToast('🏙️ City View');
                }
                if (viewMode === 'city') bossHealthDiv.classList.remove('visible');
                else if (bossHP > 0) bossHealthDiv.classList.add('visible');
            }
            viewToggle.addEventListener('click', toggleView);

            // ---- POINTER EVENTS ----
            function handlePointerDown(x, y) { isPanning = true;
                prevPointer.x = x;
                prevPointer.y = y; }

            function handlePointerMove(x, y) {
                if (!isPanning) return;
                const dx = x - prevPointer.x,
                    dy = y - prevPointer.y;
                prevPointer.x = x;
                prevPointer.y = y;
                targetTheta -= dx * 0.008;
                targetPhi -= dy * 0.008;
                targetPhi = Math.max(0.3, Math.min(1.5, targetPhi));
            }

            function handlePointerUp() { isPanning = false; }

            renderer.domElement.addEventListener('mousedown', e => handlePointerDown(e.clientX, e.clientY));
            window.addEventListener('mousemove', e => { if (isPanning) handlePointerMove(e.clientX, e.clientY); });
            window.addEventListener('mouseup', handlePointerUp);

            let touchStartDist = 0,
                isPinching = false;
            renderer.domElement.addEventListener('touchstart', e => {
                const t = e.touches;
                if (t.length === 1) { handlePointerDown(t[0].clientX, t[0].clientY); } else if (t.length === 2) {
                    isPinching = true;
                    const dx = t[0].clientX - t[1].clientX,
                        dy = t[0].clientY - t[1].clientY;
                    touchStartDist = Math.sqrt(dx * dx + dy * dy);
                }
            }, { passive: true });
            renderer.domElement.addEventListener('touchmove', e => {
                const t = e.touches;
                if (t.length === 1 && isPanning) handlePointerMove(t[0].clientX, t[0].clientY);
                else if (t.length === 2 && isPinching) {
                    const dx = t[0].clientX - t[1].clientX,
                        dy = t[0].clientY - t[1].clientY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    targetRadius = Math.max(10, Math.min(70, targetRadius - (dist - touchStartDist) * 0.05));
                    touchStartDist = dist;
                }
            }, { passive: true });
            renderer.domElement.addEventListener('touchend', e => { if (e.touches.length === 0) { isPanning = false;
                    isPinching = false; } }, { passive: true });

            // ---- CLICK / TAP ----
            function getIntersects(x, y) {
                const rect = renderer.domElement.getBoundingClientRect();
                const mx = ((x - rect.left) / rect.width) * 2 - 1,
                    my = -((y - rect.top) / rect.height) * 2 + 1;
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(mx, my), camera);
                const meshes = [];
                scene.traverse(child => { if (child.isMesh) meshes.push(child); });
                return raycaster.intersectObjects(meshes, true);
            }

            function handleTap(x, y) {
                const hits = getIntersects(x, y);
                if (hits.length > 0) {
                    let obj = hits[0].object,
                        found = null;
                    while (obj) {
                        if (obj.parent && obj.parent.userData && obj.parent.userData.type) { found = obj.parent; break; }
                        if (obj.userData && obj.userData.type) { found = obj; break; }
                        obj = obj.parent;
                    }
                    if (found) { selectObject(found); return; }
                    const hit = hits.find(h => h.object === ground);
                    if (hit && viewMode === 'world') {
                        const pos = hit.point;
                        if (selectedObject && selectedObject.userData && selectedObject.userData.type === 'troop') {
                            moveTroop(selectedObject, pos);
                            return;
                        }
                        if (armyCount > 0) {
                            const types = ['infantry', 'cavalry', 'flying'];
                            const type = types[Math.floor(Math.random() * types.length)];
                            spawnTroop(type, pos.x, pos.z, 1);
                            armyCount--;
                            updateUI();
                            showToast('⚔️ Troop deployed!');
                        } else showToast('⚠️ No army. Train troops!');
                    }
                }
                if (viewMode === 'city') {
                    for (const id in buildingMap) {
                        const b = buildingMap[id];
                        const hits2 = getIntersects(x, y);
                        for (const h of hits2) {
                            let obj = h.object;
                            while (obj) { if (obj === b.mesh) { selectBuilding(id); return; } obj = obj.parent; }
                        }
                    }
                }
            }

            function selectObject(obj) {
                selectedObject = obj;
                if (obj.userData && obj.userData.type === 'troop') {
                    selectionInfo.textContent = `⚔️ ${obj.userData.type} (T${obj.userData.tier}) HP: ${obj.userData.hp}/${obj.userData.maxHp}`;
                    selectionInfo.classList.add('visible');
                } else if (obj.userData && obj.userData.type === 'barbarian') {
                    selectionInfo.textContent = `👹 Barbarian HP: ${obj.userData.hp}/${obj.userData.maxHp}`;
                    selectionInfo.classList.add('visible');
                } else if (obj === bossGroup) {
                    selectionInfo.textContent = `🐉 Behemoth HP: ${bossHP}/${bossMaxHP}`;
                    selectionInfo.classList.add('visible');
                } else selectionInfo.classList.remove('visible');
            }

            function selectBuilding(id) {
                const b = buildingMap[id];
                if (!b) return;
                const name = id === 'cityhall' ? '🏰 City Hall' :
                    id === 'barracks' ? '⚔️ Barracks' :
                    id.includes('gold') ? '⛏️ Gold Mine' :
                    id.includes('wood') ? '🪵 Lumber Mill' : '🏠 House';
                const lvl = b.level || 1;
                selectionInfo.textContent = `${name} Lv.${lvl}`;
                selectionInfo.classList.add('visible');
                selectedObject = b;
                if (id === 'cityhall' || id === 'barracks' || id.includes('gold') || id.includes('wood')) {
                    showToast(`Tap again to upgrade (cost: ${Math.floor(50*lvl)} Gold, ${Math.floor(30*lvl)} Wood)`);
                }
            }

            // ---- UPGRADE ----
            function upgradeBuilding(id) {
                const b = buildingMap[id];
                if (!b || b.upgrading) { if (b && b.upgrading) showToast('⏳ Already upgrading!'); return; }
                const costGold = Math.floor(50 * b.level),
                    costWood = Math.floor(30 * b.level);
                if (gold < costGold || wood < costWood) { showToast('⚠️ Not enough resources!'); return; }
                gold -= costGold;
                wood -= costWood;
                b.upgrading = true;
                b.upgradeEnd = Date.now() + 5000 + b.level * 2000;
                const dur = ((b.upgradeEnd - Date.now()) / 1000).toFixed(0);
                showToast(`🔨 Upgrading... ${dur}s`);
                const pos = b.mesh.position.clone();
                pos.y += 3;
                const floatUI = createFloatUI(pos, `⏳ ${dur}s`, '#ffd700');
                b._floatUI = floatUI;
                const timerId = setInterval(() => {
                    const rem = Math.max(0, (b.upgradeEnd - Date.now()) / 1000);
                    if (rem <= 0) {
                        clearInterval(timerId);
                        b.upgrading = false;
                        b.level++;
                        if (b._floatUI) { b._floatUI.active = false;
                            b._floatUI = null; }
                        if (id === 'cityhall') {
                            cityHallLevel = b.level;
                            b.mesh.scale.set(1 + 0.05 * b.level, 1 + 0.05 * b.level, 1 + 0.05 * b.level);
                            showToast(`🏰 City Hall now Lv.${b.level}!`);
                        } else {
                            showToast(`✅ ${id} now Lv.${b.level}!`);
                        }
                        if (id.includes('gold')) { gold += 50 * b.level;
                            showToast(`+${50*b.level} Gold`); }
                        if (id.includes('wood')) { wood += 40 * b.level;
                            showToast(`+${40*b.level} Wood`); }
                        if (id === 'barracks') { armyCount += 5 * b.level;
                            showToast(`+${5*b.level} Army`); }
                        updateUI();
                        selectionInfo.textContent = `✅ Upgrade complete! Lv.${b.level}`;
                    } else {
                        if (b._floatUI) b._floatUI.el.innerHTML = `⏳ ${Math.ceil(rem)}s`;
                    }
                }, 500);
            }

            // ---- TROOP SPAWN / MOVE ----
            function spawnTroop(type, x, z, tier = 1) {
                const troop = createTroop(type, x, z, tier);
                scene.add(troop);
                troops.push(troop);
                CONFIG.TROOPS.push(troop);
                worldObjects.push(troop);
                return troop;
            }

            function moveTroop(troop, targetPos) {
                if (!troop) return;
                troop.userData.dest = targetPos.clone();
                troop.userData.state = 'moving';
                troop.userData.path = [];
                const start = troop.position.clone(),
                    end = targetPos.clone();
                const dist = start.distanceTo(end);
                if (dist < 0.5) return;
                const steps = Math.max(2, Math.floor(dist / 0.5));
                for (let i = 0; i <= steps; i++) {
                    const t = i / steps;
                    troop.userData.path.push(new THREE.Vector3().lerpVectors(start, end, t));
                }
                troop.userData.engaged = false;
                troop.userData.target = null;
            }

            // ---- COMBAT ----
            function processCombat() {
                const now = Date.now();
                troops.forEach(troop => {
                    if (!troop.parent) return;
                    const ud = troop.userData;
                    if (ud.hp <= 0) { scene.remove(troop); return; }
                    if (ud.cooldown > 0) ud.cooldown -= 0.05;
                    let closest = null,
                        closestDist = 10;
                    barbarians.forEach(b => {
                        if (!b.parent) return;
                        const d = troop.position.distanceTo(b.position);
                        if (d < closestDist && b.userData.hp > 0) { closest = b;
                            closestDist = d; }
                    });
                    if (bossHP > 0) {
                        const d = troop.position.distanceTo(bossGroup.position);
                        if (d < closestDist) { closest = bossGroup;
                            closestDist = d; }
                    }
                    if (closest && closestDist < 4.5) {
                        ud.engaged = true;
                        ud.target = closest;
                        if (ud.cooldown <= 0) {
                            const dmg = 2 + ud.tier * 2 + Math.floor(Math.random() * 3);
                            if (closest === bossGroup) {
                                bossHP = Math.max(0, bossHP - dmg);
                                spawnParticles(closest.position.clone().add(new THREE.Vector3(0, 2, 0)), 0xff4488, 25);
                                spawnDamageFloat(closest.position.clone().add(new THREE.Vector3(0, 3, 0)), dmg, '#ff4488');
                                updateUI();
                                if (bossHP <= 0) showToast('🎉 Behemoth Defeated!');
                            } else if (closest.userData) {
                                closest.userData.hp -= dmg;
                                spawnParticles(closest.position.clone(), 0xff6644, 18);
                                spawnDamageFloat(closest.position.clone(), dmg, '#ff6644');
                                if (closest.userData.hp <= 0) {
                                    scene.remove(closest);
                                    const idx = barbarians.indexOf(closest);
                                    if (idx > -1) barbarians.splice(idx, 1);
                                    showToast('⚔️ Barbarian defeated! +10 Gold');
                                    gold += 10;
                                    updateUI();
                                }
                            }
                            ud.cooldown = 0.8;
                        }
                    } else { ud.engaged = false;
                        ud.target = null; }

                    if (ud.state === 'moving' && ud.path && ud.path.length > 0) {
                        const target = ud.path[0];
                        if (target) {
                            const dir = new THREE.Vector3().copy(target).sub(troop.position);
                            const dist2 = dir.length();
                            if (dist2 < 0.2) { ud.path.shift(); if (ud.path.length === 0) { ud.state = 'idle';
                                    ud.dest = null; } } else {
                                dir.normalize();
                                const speed = ud.speed * 0.08;
                                troop.position.x += dir.x * speed;
                                troop.position.z += dir.z * speed;
                                troop.position.y = 0;
                                troop.rotation.y = Math.atan2(dir.x, dir.z);
                            }
                        }
                    }
                    if (ud.engaged && ud.target && ud.target.parent) {
                        const dir2 = new THREE.Vector3().copy(ud.target.position).sub(troop.position);
                        const dist3 = dir2.length();
                        if (dist3 > 2.5) {
                            dir2.normalize();
                            const speed2 = ud.speed * 0.06;
                            troop.position.x += dir2.x * speed2;
                            troop.position.z += dir2.z * speed2;
                            troop.rotation.y = Math.atan2(dir2.x, dir2.z);
                        }
                    }
                    if (ud.type === 'flying') troop.position.y = 1.2 + Math.sin(now * 0.003 + troop.id) * 0.3;
                    else troop.position.y = 0;
                });
                for (let i = troops.length - 1; i >= 0; i--) { if (!troops[i].parent) troops.splice(i, 1); }
            }

            // ---- RAID ----
            function raidBoss() {
                if (viewMode !== 'world') { showToast('🌍 Switch to World Map first!'); return; }
                if (bossHP <= 0) { showToast('🐉 Behemoth already defeated!'); return; }
                if (raidCooldown > 0) { showToast(`⏳ Cooldown: ${Math.ceil(raidCooldown)}s`); return; }
                if (armyCount < 3) { showToast('⚠️ Need 3 army to raid!'); return; }
                armyCount -= 3;
                const pos = bossGroup.position.clone();
                for (let i = 0; i < 3; i++) {
                    const angle = (i / 3) * Math.PI * 2 + Math.random() * 0.5;
                    const dist = 3 + Math.random() * 2;
                    const x = pos.x + Math.cos(angle) * dist,
                        z = pos.z + Math.sin(angle) * dist;
                    const types = ['infantry', 'cavalry', 'flying'];
                    const troop = spawnTroop(types[i % 3], x, z, 2);
                    troop.userData.engaged = true;
                    troop.userData.target = bossGroup;
                    troop.userData.state = 'moving';
                    troop.userData.dest = bossGroup.position.clone();
                }
                raidCooldown = 15;
                showToast('⚡ Raid party deployed!');
                updateUI();
            }

            // ---- DAY/NIGHT ----
            function updateDayNight(delta) {
                dayTime += delta / CONFIG.DAY_DURATION;
                if (dayTime > 1) dayTime -= 1;
                const angle = dayTime * Math.PI * 2;
                const sunY = Math.sin(angle) * 40,
                    sunX = Math.cos(angle) * 40,
                    sunZ = Math.sin(angle * 0.7) * 30;
                sunLight.position.set(sunX, Math.max(5, sunY + 15), sunZ);
                sunSphere.position.copy(sunLight.position);
                const intensity = Math.max(0.2, (Math.sin(angle) * 0.5 + 0.5) * 0.8 + 0.2);
                sunLight.intensity = intensity * 1.2;
                ambientLight.intensity = 0.2 + intensity * 0.4;
                const skyColor = new THREE.Color();
                if (intensity > 0.6) skyColor.setHex(0x1a3a6a);
                else if (intensity > 0.3) skyColor.setHex(0x2a1a3a);
                else skyColor.setHex(0x0a0a1a);
                scene.background = skyColor;
                scene.fog.color = skyColor;
                const emissiveIntensity = 1 - intensity;
                buildingMap.forEach(b => {
                    b.mesh.traverse(child => {
                        if (child.isMesh && child.material) {
                            const mats = Array.isArray(child.material) ? child.material : [child.material];
                            mats.forEach(m => { if (m.emissive) m.emissiveIntensity = emissiveIntensity * 0.35; });
                        }
                    });
                });
                core.material.emissiveIntensity = 1.5 + Math.sin(Date.now() * 0.003) * 0.5 + (1 - intensity) * 0.5;
            }

            // ---- RESOURCES ----
            function generateResources(delta) {
                resourceTimer += delta;
                if (resourceTimer > 2.0) {
                    resourceTimer = 0;
                    const inc = 2 + cityHallLevel;
                    gold += inc * 0.5;
                    wood += inc * 0.5;
                    if (viewMode === 'city') {
                        for (const id in buildingMap) {
                            if (id.includes('gold')) {
                                const pos = buildingMap[id].mesh.position.clone();
                                pos.y += 2.5;
                                spawnDamageFloat(pos, '+1', '#ffd700');
                            }
                            if (id.includes('wood')) {
                                const pos = buildingMap[id].mesh.position.clone();
                                pos.y += 2.5;
                                spawnDamageFloat(pos, '+1', '#8a6a4a');
                            }
                        }
                    }
                    updateUI();
                }
            }

            // ---- RESIZE ----
            window.addEventListener('resize', () => {
                const w = window.innerWidth,
                    h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });

            // ---- UI BINDINGS ----
            document.getElementById('btn-cityhall').addEventListener('click', () => {
                if (viewMode === 'world') { showToast('🌍 Switch to City View'); return; }
                selectBuilding('cityhall');
                upgradeBuilding('cityhall');
            });
            document.getElementById('btn-gold').addEventListener('click', () => {
                if (viewMode === 'world') { showToast('🌍 Switch to City View'); return; }
                selectBuilding('gold1');
                upgradeBuilding('gold1');
            });
            document.getElementById('btn-wood').addEventListener('click', () => {
                if (viewMode === 'world') { showToast('🌍 Switch to City View'); return; }
                selectBuilding('wood1');
                upgradeBuilding('wood1');
            });
            document.getElementById('btn-barracks').addEventListener('click', () => {
                if (viewMode === 'world') { showToast('🌍 Switch to City View'); return; }
                selectBuilding('barracks');
                upgradeBuilding('barracks');
            });
            document.getElementById('btn-troop-cav').addEventListener('click', () => {
                if (viewMode !== 'world') { showToast('🌍 Switch to World Map'); return; }
                if (armyCount < 1) { showToast('⚠️ No army!'); return; }
                const pos = new THREE.Vector3((Math.random() - 0.5) * 10, 0, (Math.random() - 0.5) * 10);
                const troop = spawnTroop('cavalry', pos.x, pos.z, 1 + Math.floor(Math.random() * 2));
                armyCount--;
                updateUI();
                showToast('🐴 Cavalry deployed!');
                selectObject(troop);
            });
            document.getElementById('btn-troop-inf').addEventListener('click', () => {
                if (viewMode !== 'world') { showToast('🌍 Switch to World Map'); return; }
                if (armyCount < 1) { showToast('⚠️ No army!'); return; }
                const pos = new THREE.Vector3((Math.random() - 0.5) * 10, 0, (Math.random() - 0.5) * 10);
                const troop = spawnTroop('infantry', pos.x, pos.z, 1 + Math.floor(Math.random() * 2));
                armyCount--;
                updateUI();
                showToast('🛡️ Infantry deployed!');
                selectObject(troop);
            });
            document.getElementById('btn-troop-fly').addEventListener('click', () => {
                if (viewMode !== 'world') { showToast('🌍 Switch to World Map'); return; }
                if (armyCount < 1) { showToast('⚠️ No army!'); return; }
                const pos = new THREE.Vector3((Math.random() - 0.5) * 10, 0, (Math.random() - 0.5) * 10);
                const troop = spawnTroop('flying', pos.x, pos.z, 1 + Math.floor(Math.random() * 2));
                armyCount--;
                updateUI();
                showToast('🦅 Flying unit deployed!');
                selectObject(troop);
            });
            document.getElementById('btn-raid').addEventListener('click', raidBoss);

            document.addEventListener('keydown', (e) => {
                if (e.key === 'v' || e.key === 'V') toggleView();
                if (e.key === 'r' || e.key === 'R') raidBoss();
                if (e.key === '1') document.getElementById('btn-troop-inf').click();
                if (e.key === '2') document.getElementById('btn-troop-cav').click();
                if (e.key === '3') document.getElementById('btn-troop-fly').click();
            });

            // ---- INIT ----
            updateUI();
            setView(new THREE.Vector3(0, 0, 0), 30, 0.6, 0.9);
            setTimeout(() => {
                for (let i = 0; i < 3; i++) {
                    const x = (Math.random() - 0.5) * 12,
                        z = (Math.random() - 0.5) * 12;
                    const types = ['infantry', 'cavalry', 'flying'];
                    spawnTroop(types[i % 3], x, z, 1);
                }
                armyCount += 3;
                updateUI();
                showToast('🎮 Tap world map to deploy troops');
            }, 800);

            // ---- LOOP ----
            let lastTime = 0;

            function animate(time) {
                const delta = Math.min(0.05, (time - lastTime) / 1000);
                lastTime = time;
                updateDayNight(delta);
                updateCamera();
                generateResources(delta);
                processCombat();
                if (raidCooldown > 0) raidCooldown -= delta;

                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.life -= delta;
                    p.mesh.position.x += p.vx * delta;
                    p.mesh.position.y += p.vy * delta;
                    p.mesh.position.z += p.vz * delta;
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    p.vz *= 0.98;
                    p.mesh.material.opacity = p.life / p.maxLife;
                    if (p.life <= 0) { scene.remove(p.mesh);
                        particles.splice(i, 1); }
                }
                updateFloatUIs();
                core.material.emissiveIntensity = 1.5 + Math.sin(time * 0.003) * 0.8;
                core.scale.setScalar(1 + Math.sin(time * 0.005) * 0.05);
                bossGroup.position.y = Math.sin(time * 0.001) * 0.3;

                for (const id in buildingMap) {
                    const b = buildingMap[id];
                    if (b.upgrading && b._floatUI) {
                        const rem = Math.max(0, (b.upgradeEnd - Date.now()) / 1000);
                        if (rem > 0) b._floatUI.el.innerHTML = `⏳ ${Math.ceil(rem)}s`;
                    }
                }
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate(0);
            console.log('⚔️ High-Poly 3D Grand Strategy initialized.');
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ashen Kingdom</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="topbar">
      <div class="title">
        <div class="game-name">Ashen Kingdom</div>
        <div class="subtitle">Kingdom Lobby Preview</div>
      </div>
      <div class="resources">
        <span>🪙 1,245</span>
        <span>🪵 860</span>
        <span>🪨 420</span>
        <span>🌾 310</span>
      </div>
    </div>

    <div class="hint">Drag to rotate • Pinch or wheel to zoom</div>

    <div class="bottom-panel">
      <button>World Map</button>
      <button>Heroes</button>
      <button>Alliance</button>
      <button>Items</button>
      <button>Build</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
